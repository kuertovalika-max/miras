<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Услуги — МИРАС</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="services-page">

    <header class="header">
    <div class="container">
        <!-- Логотип: SVG волны + Текст -->
        <div class="logo">
                    <a href="index.html" class="logo" style="text-decoration: none; display: flex; align-items: center;">
            <svg class="waves-svg" viewBox="0 0 120 40" xmlns="http://www.w3.org">
                <!-- Светлая волна -->
                <path d="M40 5 Q70 0 110 15 Q80 25 40 5" fill="#ADC8D9" />
                <!-- Темная волна -->
                <path d="M10 35 Q40 10 90 25 Q50 45 10 35" fill="#132B4A" />
            </svg>
            <span class="brand-name">МИРАС</span>
        </div>
        </a>
            <nav class="nav-menu">
                <a href="news.html" class="nav-item">НОВОСТИ</a>
                <a href="news2.html" class="nav-item">О КОМПЛЕКСЕ</a>
                <a href="news3.html" class="nav-item active">УСЛУГИ</a>
                <a href="news4.html" class="nav-item">О НАС</a>
            </nav>
        </div>
    </header>

    <main class="services-grid-container">
        <!-- Карточка 1 -->
        <div class="glass-card"  onclick="window.location.href='news11.html';" style="cursor: pointer;">
            <img src="./img/bas.webp" alt="Бассейн" class="card-img">
            <h3>БАССЕЙН</h3>
            <div class="card-footer">
                <span class="price">ОТ 280 РУБ</span>
                <a href="#" class="btn-more">ПОДРОБНЕЕ</a>
            </div>
        </div>

        <!-- Карточка 2 -->
        <div class="glass-card"  onclick="window.location.href='news12.html';" style="cursor: pointer;">
            <img src="./img/tren.webp" alt="Тренажерный зал" class="card-img">
            <h3>ТРЕНАЖЕРНЫЙ ЗАЛ</h3>
            <div class="card-footer">
                <span class="price">ОТ 370 РУБ</span>
                <a href="#" class="btn-more">ПОДРОБНЕЕ</a>
            </div>
        </div>

        <!-- Карточка 3 -->
        <div class="glass-card" onclick="window.location.href='news13.html';" style="cursor: pointer;">
            <img src="./img/zal.png" alt="Зал долголетия" class="card-img">
            <h3>ЗАЛ ДОЛГОЛЕТИЯ</h3>
            <div class="card-footer">
                <span class="price">ОТ 220 РУБ</span>
                <a href="#" class="btn-more">ПОДРОБНЕЕ</a>
            </div>
        </div>

        <!-- Карточка 4 (Второй ряд) -->
        <div class="glass-card" onclick="window.location.href='news14.html';" style="cursor: pointer;">
            <img src="./img/zal+bas.png" alt="Бассейн + Зал" class="card-img">
            <h3>БАССЕЙН + ТРЕНАЖЕРНЫЙ ЗАЛ</h3>
            <div class="card-footer">
                <span class="price">ОТ 550 РУБ</span>
                <a href="#" class="btn-more">ПОДРОБНЕЕ</a>
            </div>
        </div>

        <!-- Карточка 5 (Второй ряд) -->
        <div class="glass-card" onclick="window.location.href='news15.html';" style="cursor: pointer;">
            <img src="./img/bas+centr.png" alt="Бассейн + Долголетие" class="card-img">
            <h3>БАССЕЙН + ЦЕНТР ДОЛГОЛЕТИЯ</h3>
            <div class="card-footer">
                <span class="price">ОТ 380 РУБ</span>
                <a href="#" class="btn-more">ПОДРОБНЕЕ</a>
            </div>
        </div>
    </main>

    <footer class="main-footer">
    <!-- Светло-голубая панель с логотипами -->
    <div class="footer-top">
        <div class="footer-container">
            <!-- Герб Альметьевска -->
            <div class="footer-logo">
                <img src="./img/gerb.png" alt="Герб" class="gerb-img">
            </div>

            <!-- Социальные сети -->
            <div class="footer-socials">
                <a href="https://vk.com/miras.almet" target="_blank" class="social-item">
                    <img src="./img/vk.png" alt="VK">
                </a>
                <a href="https://instagram.com" target="_blank" class="social-item">
                    <img src="./img/inst.png" alt="Instagram">
                    <span>INSTAGRAM</span>
                </a>
            </div>

            <!-- Логотип Татнефть -->
            <div class="footer-brand">
                <img src="./img/tatnef.png" alt="TATNEFT">
            </div>
        </div>
    </div>

    <!-- Черная полоса в самом низу -->
    <div class="footer-bottom">
        <p>Made on Tilda</p>
    </div>
</footer>


</body>
</html>
